<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>會議時間統計</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div id="config-error" class="config-error hidden">
      <h1>結果頁連結不完整</h1>
      <p>請回首頁重新輸入 Google 設定與 meeting_id。</p>
      <a class="primary-btn as-link" href="./index.html">回首頁</a>
    </div>

    <main id="results-app" class="shell hidden">
      <header class="page-header">
        <div>
          <p class="eyebrow">統計結果</p>
          <h1>會議可行時段</h1>
        </div>
        <div class="actions">
          <button id="refresh-results" class="ghost-btn" type="button">重新同步</button>
          <span id="sync-status" class="sync-pill">尚未同步</span>
        </div>
      </header>

      <section class="dashboard-grid">
        <div id="result-info" class="panel"></div>
        <div class="panel qr-panel">
          <label><span>參加者連結</span><textarea id="participant-link" rows="3" readonly></textarea></label>
          <div id="qr-code" class="qr-code"></div>
        </div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <p class="eyebrow">Calendar</p>
          <h2>時段統計</h2>
        </div>
        <div id="stats-grid" class="calendar-grid"></div>
      </section>

      <section class="dashboard-grid">
        <div class="panel">
          <div class="section-heading">
            <p class="eyebrow">Recommendation</p>
            <h2>推薦時段</h2>
          </div>
          <ol id="recommendations" class="recommend-list"></ol>
        </div>

        <div class="panel">
          <div class="section-heading">
            <p class="eyebrow">Final</p>
            <h2>最終時間</h2>
          </div>
          <div id="final-panel"></div>
        </div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <p class="eyebrow">Participants</p>
          <h2>參加者回覆</h2>
        </div>
        <div class="table-wrap">
          <table id="participant-table">
            <thead>
              <tr><th>姓名</th><th>已選時段</th><th>最後更新</th><th>備註</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module" src="./js/results.js"></script>
  </body>
</html>
